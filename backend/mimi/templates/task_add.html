<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="taskadd-container">
        <div class="taskadd-card">
            <div class="taskadd-header">
                <h1>Add New Task</h1>
            </div>    
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-group"></div>
                    <label for="title">title:</label>

                
                    <input type="text" name="title" required><br><br>
            </div>   
        
                
                <label for="description">description:</label>

                <div class="input-box">
                    <input type="text" name="description" required><br><br>
                </div>

                <label for="completed">completed:</label>

                <div class="input-box">
                    <input type="checkbox"  name="completed" id=""> Tick <br><br>
                    <input type="checkbox"  name="completed" id="" checked> empty <br><br>
                </div>

                <label for="image">Image:</label>

                <div class="input-box">
                    <input type="file" name="image" accept="image/*"><br><br>
                </div>    

                <input type="submit" value="Add task">
            </form>

            <a href="{% url 'task_list' %}">Add task</a>
            {% if form.errors %}
                {% endif %}
        </div>  
    </div>          
</body>
</html>
